; Hub firmware — Seeed XIAO ESP32S3 + Wio-SX1262 (the board on your desk now).
; The hub stays on the ESP32S3 because it needs WiFi to reach Firebase;
; the nRF52840 nodes have no WiFi radio.
;
; Build:          pio run
; Flash over USB: pio run -t upload
; Watch logs:     pio device monitor
; (run these from hub/ — see docs/03-flashing.md)

[env:hub]
platform = espressif32@^6.9.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

; ../shared holds protocol.h, the radio settings + packet layout that the
; node firmware compiles against too.
build_flags = -I../shared

lib_deps =
    jgromes/RadioLib@^7.1.0
    bblanchon/ArduinoJson@^7.2.0
