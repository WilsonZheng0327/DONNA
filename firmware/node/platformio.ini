; Desk node firmware — ToF sensor + LoRa transmitter, one per desk.
;
; !! Board target is currently the same XIAO ESP32S3 + Wio-SX1262 kit as the
; !! hub, because the real node hardware hasn't been identified yet. Plug a
; !! node into USB and check `udevadm info -q property /dev/ttyACM0` — if it
; !! is a different board, only this file and include/config.h (pins) change.
;
; Each desk gets its own env carrying its identity: a compact NODE_ID for
; logs, plus the floor and desk ID that go into its database path
; (country/site/office are building-wide, set in include/config.h).
;   pio run -e node1 -t upload     (flashes desk 4T434G's node)
;
; Add a desk = copy one of the env blocks below with new values.

[env]
platform = espressif32@^6.9.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags = -I../../shared
lib_deps =
    jgromes/RadioLib@^7.1.0
    pololu/VL53L0X@^1.3.1

[env:node1]
build_flags = ${env.build_flags} -DNODE_ID=1 -DDESK_FLOOR=\"4\" -DDESK_ID_STR=\"4T434G\"

[env:node2]
build_flags = ${env.build_flags} -DNODE_ID=2 -DDESK_FLOOR=\"4\" -DDESK_ID_STR=\"DESK2\"

[env:node3]
build_flags = ${env.build_flags} -DNODE_ID=3 -DDESK_FLOOR=\"4\" -DDESK_ID_STR=\"DESK3\"
