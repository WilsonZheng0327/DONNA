; Desk node firmware — VL53L5CX ToF sensor + LoRa transmitter, one per desk.
;
; Board: Seeed XIAO nRF52840 + Wio-SX1262 kit. The nRF52840 has no WiFi (it
; never needs it — nodes only transmit LoRa), and its low sleep current suits
; a battery desk sensor. Pins differ from the ESP32S3 hub; see
; include/config.h and docs/01-hardware.md.
;
; Each desk gets its own env carrying its identity: a compact NODE_ID for
; logs, plus the floor and desk ID that go into its database path
; (country/site/office are building-wide, set in include/config.h).
;   pio run -e node1 -t upload     (flashes desk 4T434G's node)
;
; Add a desk = copy one of the env blocks below with new values.

[env]
; The XIAO nRF52840 Sense ships an Adafruit UF2 bootloader carrying SoftDevice
; S140 v7.3.0, so the app must link to start at 0x27000. The mainline
; nordicnrf52 platform ships no XIAO board and only a v6 linker script, which
; mislinks the app to 0x26000 and hard-faults on boot (no USB, no LoRa).
; maxgerhardt's fork provides the correct xiaoblesense_adafruit board — v7
; SoftDevice, matching linker script, and the XIAO variant — so no board.json
; or variant needs to be vendored here anymore.
platform = https://github.com/maxgerhardt/platform-nordicnrf52
board = xiaoblesense_adafruit
framework = arduino
monitor_speed = 115200
build_flags = -I../shared
lib_deps =
    jgromes/RadioLib@^7.1.0
    sparkfun/SparkFun VL53L5CX Arduino Library@^1.0.3

[env:node1]
build_flags = ${env.build_flags} -DNODE_ID=1 -DDESK_FLOOR=\"4\" -DDESK_ID_STR=\"4T434G\"

[env:node2]
build_flags = ${env.build_flags} -DNODE_ID=2 -DDESK_FLOOR=\"4\" -DDESK_ID_STR=\"DESK2\"

[env:node3]
build_flags = ${env.build_flags} -DNODE_ID=3 -DDESK_FLOOR=\"4\" -DDESK_ID_STR=\"DESK3\"
